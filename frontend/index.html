<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Care U - 智慧照護陪伴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background-color: #F7F3EE;
            color: #3D3530;
        }
        .chat-bubble-ai {
            background: #FFFFFF;
            color: #3D3530;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #E8E2DC;
        }
        .chat-bubble-user {
            background: #7B9E87;
            color: #FFFFFF;
        }
        .btn-primary {
            background-color: #C17F5A;
            color: white;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: #A86844; }
        .btn-voice {
            background-color: #7B9E87;
            color: white;
            transition: all 0.2s;
        }
        .btn-voice:hover { background-color: #5F8470; }
        .wave-bar { animation: wave 1.5s ease-in-out infinite; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(2.5); }
        }
        #chat-container {
            scrollbar-width: thin;
            scrollbar-color: #C8BDB7 #F0EBE5;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 頂部標題列 -->
    <div style="background-color: #EDE8E3; border-bottom: 2px solid #D6CEC7;" class="p-4 flex-shrink-0">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div style="font-size: 36px;">🌸</div>
                <div>
                    <h1 class="font-bold" style="font-size: 28px; color: #3D3530;">AI Care U</h1>
                    <p style="font-size: 16px; color: #7F8C8D;">您的智慧照護陪伴</p>
                </div>
            </div>
            <div class="text-right">
                <div style="font-size: 16px; color: #7F8C8D;">陪伴對象</div>
                <div id="elder-name" class="font-bold" style="font-size: 26px; color: #C17F5A;">載入中...</div>
            </div>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="max-w-3xl w-full mx-auto p-4 flex flex-col gap-3 flex-1 overflow-hidden">

        <!-- 情緒狀態列 -->
        <div style="background: white; border: 1px solid #E0E0E0; border-radius: 16px;" class="p-4 flex items-center gap-4 flex-shrink-0">
            <div id="status-icon" class="text-3xl">💛</div>
            <div>
                <div style="font-size: 16px; color: #7F8C8D;">目前情緒狀態</div>
                <div id="emotion-status" class="font-semibold" style="font-size: 22px; color: #3D3530;">等待對話...</div>
            </div>
            <div class="ml-auto text-right">
                <div style="font-size: 16px; color: #7F8C8D;">對話輪數</div>
                <div id="chat-count" class="font-bold" style="font-size: 30px; color: #C17F5A;">0</div>
            </div>
        </div>

        <!-- 對話區域 -->
        <div id="chat-container"
             style="background: #F0EBE5; border-radius: 16px; border: 1px solid #D6CEC7;"
             class="p-4 flex-1 overflow-y-auto flex flex-col gap-4 min-h-0">
            <div class="text-center py-12" style="color: #BDC3C7; font-size: 22px;">
                請點擊下方「開始對話」來啟動陪伴系統
            </div>
        </div>

        <!-- 語音視覺化 -->
        <div id="voice-visualizer"
             style="background: #F5EFEA; border: 2px solid #C17F5A; border-radius: 16px;"
             class="hidden p-3 flex items-center justify-center gap-1 flex-shrink-0">
            <div class="w-1 h-5 rounded wave-bar" style="background:#C17F5A; animation-delay:0s"></div>
            <div class="w-1 h-5 rounded wave-bar" style="background:#C17F5A; animation-delay:0.1s"></div>
            <div class="w-1 h-5 rounded wave-bar" style="background:#C17F5A; animation-delay:0.2s"></div>
            <div class="w-1 h-5 rounded wave-bar" style="background:#C17F5A; animation-delay:0.3s"></div>
            <div class="w-1 h-5 rounded wave-bar" style="background:#C17F5A; animation-delay:0.4s"></div>
            <span class="ml-3 font-semibold" id="voice-status" style="color:#C17F5A; font-size:20px;">正在錄音...</span>
        </div>

        <!-- 文字輸入區 -->
        <div style="background: white; border: 1px solid #D6CEC7; border-radius: 16px;" class="p-3 flex gap-3 flex-shrink-0">
            <input id="text-input" type="text" placeholder="輸入訊息..."
                style="font-size: 22px; border: 2px solid #D6CEC7; border-radius: 12px; padding: 14px 16px; background: #F0EBE5; color: #3D3530;"
                class="flex-1 focus:outline-none disabled:opacity-50" disabled />
            <button id="send-btn" class="btn-primary px-6 rounded-xl font-bold disabled:opacity-40 disabled:cursor-not-allowed" style="font-size: 22px;" disabled>送出</button>
        </div>

        <!-- 控制按鈕 -->
        <div class="flex gap-3 flex-shrink-0">
            <button id="start-btn" class="btn-primary flex-1 rounded-2xl font-bold" style="font-size: 24px; padding: 20px;">🌟 開始對話</button>
            <button id="record-btn" class="btn-voice rounded-2xl font-bold disabled:opacity-40 disabled:cursor-not-allowed" style="font-size: 22px; padding: 20px 32px;" disabled>🎙️ 語音輸入</button>
            <button id="clear-btn" class="rounded-2xl font-bold" style="background: #D6CEC7; color: #3D3530; font-size: 22px; padding: 20px 28px;">清除</button>
        </div>

    </div>

    <script src="/static/app.js?v=7"></script>
</body>
</html>
