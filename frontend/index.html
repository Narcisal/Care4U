<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Care U - 智慧照護陪伴系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-bubble-ai {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-bubble-user {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .wave-animation {
            animation: wave 1.5s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(2); }
        }
        #chat-container {
            scrollbar-width: thin;
            scrollbar-color: #764ba2 #f1f1f1;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- 頂部標題列 -->
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-4 shadow-lg flex-shrink-0">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-4xl">🤖</div>
                <div>
                    <h1 class="text-2xl font-bold">AI Care U</h1>
                    <p class="text-purple-200 text-sm">智慧照護陪伴系統</p>
                </div>
            </div>
            <div id="elder-info" class="text-right text-sm">
                <div class="text-purple-200">陪伴對象</div>
                <div id="elder-name" class="font-bold text-lg">載入中...</div>
            </div>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="max-w-4xl w-full mx-auto p-4 flex flex-col gap-3 flex-1 overflow-y-auto">

        <!-- 情緒狀態欄 -->
        <div class="bg-white rounded-2xl p-3 shadow flex items-center gap-4 flex-shrink-0">
            <div class="text-2xl">💭</div>
            <div>
                <div class="text-gray-500 text-sm">目前情緒狀態</div>
                <div id="emotion-status" class="font-semibold text-gray-700">等待對話...</div>
            </div>
            <div class="ml-auto">
                <div class="text-gray-500 text-sm">對話輪數</div>
                <div id="chat-count" class="font-bold text-purple-600 text-xl text-right">0</div>
            </div>
        </div>

        <!-- 對話區域 -->
        <div id="chat-container"
             class="bg-white rounded-2xl shadow p-4 flex-1 overflow-y-auto flex flex-col gap-3 min-h-0">
            <div class="text-center text-gray-400 text-sm py-8">
                點擊「開始對話」來啟動陪伴系統
            </div>
        </div>

        <!-- 語音視覺化 -->
        <div id="voice-visualizer"
             class="hidden bg-white rounded-2xl shadow p-3 flex items-center justify-center gap-1 flex-shrink-0">
            <div class="w-1 h-4 bg-purple-400 rounded wave-animation" style="animation-delay: 0s"></div>
            <div class="w-1 h-4 bg-purple-400 rounded wave-animation" style="animation-delay: 0.1s"></div>
            <div class="w-1 h-4 bg-purple-400 rounded wave-animation" style="animation-delay: 0.2s"></div>
            <div class="w-1 h-4 bg-purple-400 rounded wave-animation" style="animation-delay: 0.3s"></div>
            <div class="w-1 h-4 bg-purple-400 rounded wave-animation" style="animation-delay: 0.4s"></div>
            <span class="ml-3 text-purple-600 font-medium" id="voice-status">正在聆聽...</span>
        </div>

        <!-- 文字輸入區 -->
        <div class="bg-white rounded-2xl shadow p-3 flex gap-3 flex-shrink-0">
            <input
                id="text-input"
                type="text"
                placeholder="輸入訊息..."
                class="flex-1 border-2 border-purple-200 rounded-xl px-4 py-2 text-lg focus:outline-none focus:border-purple-500"
                disabled
            />
            <button
                id="send-btn"
                onclick="sendMessage()"
                class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold text-lg hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
                disabled
            >
                送出
            </button>
        </div>

        <!-- 控制按鈕 -->
        <div class="flex gap-3 flex-shrink-0">
            <button
                id="start-btn"
                onclick="startSession()"
                class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-2xl font-bold text-xl hover:opacity-90 transition shadow-lg"
            >
                🌟 開始對話
            </button>
            <button
                onclick="clearChat()"
                class="bg-gray-200 text-gray-600 px-6 py-3 rounded-2xl font-bold hover:bg-gray-300 transition"
            >
                清除
            </button>
        </div>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
