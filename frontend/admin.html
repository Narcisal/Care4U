<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Care U - 照護人員後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background-color: #F7F3EE;
            color: #3D3530;
        }
        .btn-primary {
            background-color: #C17F5A;
            color: white;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: #A86844; }
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100%;
            width: 260px;
            background: #EDE8E3;
            border-right: 1px solid #D6CEC7;
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        #sidebar.open { transform: translateX(0); }
        #overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.2);
            z-index: 40; display: none;
        }
        #overlay.open { display: block; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; border-radius: 12px;
            cursor: pointer; transition: background 0.2s;
            font-size: 17px; color: #3D3530; margin: 4px 8px;
        }
        .nav-item:hover { background: #D6CEC7; }
        .nav-item.active { background: #C17F5A; color: white; }
        .card {
            background: white;
            border-radius: 16px;
            border: 1px solid #D6CEC7;
            padding: 24px;
        }
        input, select {
            width: 100%;
            padding: 16px 18px;
            height: 52px;
            border: 1px solid #D6CEC7;
            border-radius: 10px;
            font-size: 17px;
            background: #F7F3EE;
            color: #3D3530;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', sans-serif;
            line-height: 1.5;
        }

        label {
            font-size: 14px;
            color: #7F8C8D;
            display: block;
            margin-bottom: 8px;
            margin-top: 4px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="overlay" onclick="closeSidebar()"></div>

<!-- 側邊欄 -->
<div id="sidebar">
    <div style="padding: 24px 20px 16px; border-bottom: 1px solid #D6CEC7;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="font-size: 26px;">🌸</div>
            <div>
                <div style="font-size: 17px; font-weight: 500;">AI Care U</div>
                <div style="font-size: 12px; color: #7F8C8D;">照護人員後台</div>
            </div>
        </div>
    </div>
    <div style="padding: 12px 0;">
        <div style="font-size: 12px; color: #9B8E87; padding: 8px 20px;">管理功能</div>
        <div class="nav-item active" id="nav-profile" onclick="navigateTo('profile')">
            <span style="font-size: 20px;">👴</span>
            <span>長者資料建檔</span>
        </div>
        <div class="nav-item" id="nav-dashboard" onclick="navigateTo('dashboard')">
            <span style="font-size: 20px;">📋</span>
            <span>對話紀錄後台</span>
        </div>
        <div style="font-size: 12px; color: #9B8E87; padding: 16px 20px 8px;">即將推出</div>
        <div class="nav-item" style="opacity: 0.4; cursor: not-allowed;">
            <span style="font-size: 20px;">👁️</span>
            <span>iSafe 安全監控</span>
        </div>
        <div class="nav-item" style="opacity: 0.4; cursor: not-allowed;">
            <span style="font-size: 20px;">🧠</span>
            <span>決策後台</span>
        </div>
    </div>
    <div style="position: absolute; bottom: 24px; left: 0; right: 0; padding: 0 20px; text-align: center;">
        <a href="/" style="font-size: 13px; color: #C17F5A; text-decoration: none;">← 返回長者對話頁面</a>
    </div>
</div>

<!-- 頂部標題列 -->
<div style="background-color: #EDE8E3; border-bottom: 2px solid #D6CEC7;" class="p-4 flex-shrink-0">
    <div class="max-w-4xl mx-auto flex items-center gap-3">
        <button onclick="openSidebar()" style="background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; color: #3D3530; font-size: 24px;">☰</button>
        <div style="font-size: 28px;">🌸</div>
        <div>
            <h1 class="font-bold" style="font-size: 24px; color: #3D3530;" id="page-title">長者資料建檔</h1>
            <p style="font-size: 14px; color: #7F8C8D;" id="page-subtitle">管理長者個人資料</p>
        </div>
    </div>
</div>

<!-- 頁面內容 -->
<div class="flex-1 overflow-hidden flex flex-col">

    <!-- 長者資料建檔頁面 -->
    <div id="page-profile" class="max-w-4xl w-full mx-auto p-4 flex-1 overflow-y-auto">
        <div class="card">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
                <h2 style="font-size: 20px; font-weight: 500;">👴 長者資料建檔</h2>
                <select id="elder-select" onchange="loadElderData(this.value)"
                    style="width: auto; padding: 8px 12px; font-size: 15px;">
                    <option value="W001">王大明</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>姓名</label>
                    <input id="field-name" type="text" placeholder="王大明">
                </div>
                <div>
                    <label>性別</label>
                    <select id="field-gender">
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
                <div>
                    <label>曾任職業</label>
                    <input id="field-job" type="text" placeholder="國中數學老師">
                </div>
                <div>
                    <label>說話偏好</label>
                    <input id="field-tone" type="text" placeholder="尊敬且親切">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label>興趣愛好 <span style="color: #BDC3C7;">（用「、」分隔）</span></label>
                    <input id="field-hobbies" type="text" placeholder="聽鄧麗君、下象棋">
                </div>
                <div>
                    <label>身體敏感 <span style="color: #BDC3C7;">（用「、」分隔）</span></label>
                    <input id="field-sensitivity" type="text" placeholder="怕冷、腰部舊傷">
                </div>
                <div>
                    <label>飲食習慣</label>
                    <input id="field-diet" type="text" placeholder="喜歡熱豆漿，不吃苦瓜">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label>家人關係</label>
                    <div id="family-list" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;"></div>
                    <button onclick="addFamilyRow()" type="button"
                        style="width: 100%; padding: 12px; border: 2px dashed #D6CEC7; border-radius: 10px; background: none; color: #9B8E87; font-size: 16px; cursor: pointer; font-family: inherit;">
                        ＋ 新增家人
                    </button>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button onclick="loadElderData(document.getElementById('elder-select').value)"
                    style="flex: 1; padding: 14px; font-size: 17px; background: #D6CEC7; color: #3D3530; border: none; border-radius: 16px; cursor: pointer; font-family: inherit;">
                    🔄 重新載入
                </button>
                <button onclick="saveElderProfile()"
                    class="btn-primary"
                    style="flex: 2; padding: 14px; font-size: 18px; border: none; border-radius: 16px; cursor: pointer; font-family: inherit;">
                    💾 儲存資料
                </button>
            </div>
            <div id="save-message" style="display: none; text-align: center; margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 15px;"></div>
        </div>
    </div>

    <!-- 對話紀錄後台 -->
    <div id="page-dashboard" class="hidden max-w-4xl w-full mx-auto p-4 flex-1 overflow-y-auto">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div class="card" style="text-align: center;">
                <div style="font-size: 13px; color: #7F8C8D; margin-bottom: 8px;">查詢長者</div>
                <select id="dash-elder-select" onchange="loadHistory(this.value)"
                    style="font-size: 16px; text-align: center;">
                    <option value="W001">王大明</option>
                </select>
            </div>
            <div class="card" style="text-align: center;">
                <div style="font-size: 13px; color: #7F8C8D; margin-bottom: 8px;">近期情緒事件</div>
                <div id="dash-event-count" style="font-size: 36px; font-weight: 500; color: #C17F5A;">0</div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 18px; font-weight: 500; margin-bottom: 16px;">📝 近期情緒紀錄</h2>
            <div id="dash-events" style="display: flex; flex-direction: column; gap: 10px;">
                <div style="text-align: center; color: #BDC3C7; padding: 24px; font-size: 15px;">載入中...</div>
            </div>
        </div>
    </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('open');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
}

function navigateTo(page) {
    document.getElementById('page-profile').classList.add('hidden');
    document.getElementById('page-dashboard').classList.add('hidden');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + page).classList.add('active');
    document.getElementById('page-' + page).classList.remove('hidden');

    const titles = {
        profile: ['長者資料建檔', '管理長者個人資料'],
        dashboard: ['對話紀錄後台', '查看情緒紀錄與事件']
    };
    document.getElementById('page-title').textContent = titles[page][0];
    document.getElementById('page-subtitle').textContent = titles[page][1];

    if (page === 'profile') loadElderData(document.getElementById('elder-select').value);
    if (page === 'dashboard') loadHistory(document.getElementById('dash-elder-select').value);
    closeSidebar();
}

async function loadElderData(elderId) {
    try {
        const res = await fetch(`${API_BASE}/api/profile/${elderId}`);
        const profile = await res.json();
        document.getElementById('field-name').value = profile.name || '';
        document.getElementById('field-gender').value = profile.gender || 'male';
        document.getElementById('field-job').value = profile.persona?.former_job || '';
        document.getElementById('field-tone').value = profile.persona?.tone_preference || '';
        document.getElementById('field-hobbies').value = (profile.persona?.hobbies || []).join('、');
        document.getElementById('field-sensitivity').value = (profile.health_notes?.sensitivity || []).join('、');
        document.getElementById('field-diet').value = profile.health_notes?.diet || '';
        const family = profile.persona?.family || {};
        document.getElementById('field-family').value = Object.entries(family).map(([k, v]) => `${k}：${v}`).join('、');
    } catch (e) {
        console.error('載入失敗', e);
    }
}

const FAMILY_ROLES = ["女兒", "兒子", "孫子", "孫女", "配偶", "媳婦", "女婿", "外孫", "外孫女", "其他"];

function addFamilyRow(role = "", name = "") {
    const container = document.getElementById('family-list');
    const row = document.createElement('div');
    row.style.cssText = "display: flex; gap: 10px; align-items: center;";
    
    const isCustom = role && !FAMILY_ROLES.slice(0, -1).includes(role);
    const displayRole = isCustom ? "其他" : role;
    const customValue = isCustom ? role : "";
    
    row.innerHTML = `
        <div style="width: 140px; flex-shrink: 0; position: relative;">
            <select onchange="toggleCustomRole(this)" 
                style="width: 140px; height: 52px; display: ${isCustom ? 'none' : 'block'};">
                ${FAMILY_ROLES.map(r => `<option value="${r}" ${r === displayRole ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
            <div style="display: ${isCustom ? 'flex' : 'none'}; align-items: center; gap: 4px;">
                <input type="text" placeholder="輸入稱謂" value="${customValue}"
                    class="custom-role-input"
                    style="width: 100px; height: 52px; flex: 1;">
                <button onclick="resetToSelect(this)" type="button"
                    style="width: 32px; height: 32px; border-radius: 50%; background: #D6CEC7; border: none; color: #3D3530; font-size: 14px; cursor: pointer; flex-shrink: 0;">
                    ↩
                </button>
            </div>
        </div>
        <input type="text" placeholder="請輸入姓名" value="${name}"
            class="family-name-input"
            style="flex: 1; height: 52px;">
        <button onclick="this.closest('div[style*=flex]').remove()" type="button"
            style="width: 44px; height: 44px; border-radius: 50%; background: #FDECEA; border: none; color: #C17B7B; font-size: 20px; cursor: pointer; flex-shrink: 0;">
            ×
        </button>
    `;
    container.appendChild(row);
}

function toggleCustomRole(select) {
    if (select.value === "其他") {
        const wrapper = select.parentElement;
        select.style.display = 'none';
        wrapper.querySelector('div').style.display = 'flex';
        wrapper.querySelector('.custom-role-input').focus();
    }
}

function resetToSelect(btn) {
    const wrapper = btn.closest('div[style*=relative]');
    wrapper.querySelector('select').style.display = 'block';
    wrapper.querySelector('select').value = '女兒';
    wrapper.querySelector('div').style.display = 'none';
    wrapper.querySelector('.custom-role-input').value = '';
}

function getFamilyData() {
    const rows = document.getElementById('family-list').querySelectorAll('div[style]');
    const family = {};
    rows.forEach(row => {
        const select = row.querySelector('select');
        const customInput = row.querySelector('.custom-role-input');
        const nameInput = row.querySelector('.family-name-input');
        if (!select || !nameInput || !nameInput.value.trim()) return;
        
        let role = select.value;
        if (role === "其他" && customInput && customInput.value.trim()) {
            role = customInput.value.trim();
        } else if (role === "其他") {
            return;
        }
        family[role] = nameInput.value.trim();
    });
    return family;
}

async function saveElderProfile() {
    const elderId = document.getElementById('elder-select').value;
    const msgEl = document.getElementById('save-message');
    try {
        const res = await fetch(`${API_BASE}/api/profile/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                elder_id: elderId,
                name: document.getElementById('field-name').value,
                gender: document.getElementById('field-gender').value,
                former_job: document.getElementById('field-job').value,
                tone_preference: document.getElementById('field-tone').value,
                hobbies: document.getElementById('field-hobbies').value,
                sensitivity: document.getElementById('field-sensitivity').value,
                diet: document.getElementById('field-diet').value,
                family: document.getElementById('field-family').value,
            })
        });
        const data = await res.json();
        msgEl.style.display = 'block';
        msgEl.style.background = '#E8F5EC';
        msgEl.style.color = '#2D6A4F';
        msgEl.textContent = '✅ ' + data.message;
    } catch (e) {
        msgEl.style.display = 'block';
        msgEl.style.background = '#FDECEA';
        msgEl.style.color = '#922B21';
        msgEl.textContent = '❌ 儲存失敗';
    }
}

async function loadHistory(elderId) {
    try {
        const res = await fetch(`${API_BASE}/api/profile/${elderId}`);
        const profile = await res.json();
        const events = profile.recent_events || [];

        document.getElementById('dash-event-count').textContent = events.length;

        const container = document.getElementById('dash-events');
        if (events.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #BDC3C7; padding: 24px; font-size: 15px;">尚無情緒紀錄</div>';
            return;
        }

        container.innerHTML = '';
        events.slice().reverse().forEach(evt => {
            const sentimentColor = evt.sentiment === 'negative' ? '#FDECEA' : '#E8F5EC';
            const sentimentText = evt.sentiment === 'negative' ? '😢 負向' : '😊 正向';
            const div = document.createElement('div');
            div.style.cssText = `background: ${sentimentColor}; border-radius: 10px; padding: 12px 16px; font-size: 15px;`;
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                    <span style="font-weight: 500; color: #3D3530;">${evt.event}</span>
                    <span style="font-size: 13px; color: #7F8C8D;">${evt.date}</span>
                </div>
                <div style="font-size: 13px; color: #7F8C8D;">${sentimentText} ${evt.topic_tags ? '｜' + evt.topic_tags.join('、') : ''}</div>
            `;
            container.appendChild(div);
        });
    } catch (e) {
        console.error('載入失敗', e);
    }
}

window.addEventListener('load', () => {
    loadElderData('W001');
});
</script>
</body>
</html>
